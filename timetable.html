<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Tuition Timetable</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:90%;
            max-width:850px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
            font-size:35px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:10px;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:15px;
            font-size:20px;
        }

        td{
            padding:15px;
            text-align:center;
            font-size:18px;
            border:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        tr:hover{
            background:#d9f2ff;
            transition:0.3s;
        }

        .monday{
            background:#ffe5ec;
        }

        .tuesday{
            background:#fff3cd;
        }

        .wednesday{
            background:#d4edda;
        }

        .thursday{
            background:#e2e3ff;
        }

        .friday{
            background:#fde2e4;
        }

        .saturday{
            background:#caf0f8;
        }

        .sunday{
            background:#ffb3b3;
            color:#b00020;
            font-weight:bold;
        }

        footer{
            margin-top:20px;
            text-align:center;
            color:#555;
            font-size:16px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Weekly Tuition Timetable 📚</h1>

    <table>

        <tr>
            <th>Day</th>
            <th>Subject</th>
        </tr>

        <tr class="monday">
            <td>Monday</td>
            <td>biology/ English Grammar</td>
        </tr>

        <tr class="tuesday">
            <td>Tuesday</td>
            <td>Science</td>
        </tr>

        <tr class="wednesday">
            <td>Wednesday</td>
            <td>History / Geography</td>
        </tr>

        <tr class="thursday">
            <td>Thursday</td>
            <td>Hindi / Hindi Grammar</td>
        </tr>

        <tr class="friday">
            <td>Friday</td>
            <td>Mathematics / GK</td>
        </tr>

        <tr class="saturday">
            <td>Saturday</td>
            <td>Marathi / Marathi Grammar</td>
        </tr>

        <tr class="sunday">
            <td>Sunday</td>
            <td>🎉 Holiday 🎉</td>
        </tr>

    </table>

    <footer>
        📖 Study regularly and keep learning every day! 🌟
    </footer>

</div>

</body>
</html>
